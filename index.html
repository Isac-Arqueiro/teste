// ================= CONTROLE TEMPLATES =================

const select=document.getElementById("templateSelect");
const canvas=document.getElementById("canvas");

templates.forEach((t,i)=>{
const op=document.createElement("option");
op.value=i;
op.textContent=t.nome;
select.appendChild(op);
});

select.addEventListener("change",()=>{
canvas.style.background=templates[select.value].bg;
canvas.innerHTML=templates[select.value].html;
});

canvas.style.background=templates[0].bg;
canvas.innerHTML=templates[0].html;

// ================= INDEXED DB =================

let db;
const request=indexedDB.open("StudioVerticalPro",1);

request.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("artes",{keyPath:"id",autoIncrement:true});
};

request.onsuccess=e=>{
db=e.target.result;
loadSaved();
};

function saveToDB(){
if(!db) return alert("Banco ainda carregando...");
const tx=db.transaction("artes","readwrite");
const store=tx.objectStore("artes");
store.add({
conteudo:canvas.innerHTML,
bg:canvas.style.background
});
tx.oncomplete=loadSaved;
}

function loadSaved(){
if(!db) return;
const list=document.getElementById("savedList");
list.innerHTML="";
const tx=db.transaction("artes","readonly");
const store=tx.objectStore("artes");
store.openCursor().onsuccess=e=>{
const cursor=e.target.result;
if(cursor){
const div=document.createElement("div");
div.className="savedItem";
div.textContent="Arte "+cursor.key;
div.onclick=()=>{
canvas.innerHTML=cursor.value.conteudo;
canvas.style.background=cursor.value.bg;
};
list.appendChild(div);
cursor.continue();
}
};
}

// ================= EXPORTAR =================

function exportImage(type){
html2canvas(canvas,{scale:3}).then(canvasImg=>{
const link=document.createElement("a");
link.download="cartaz."+type;
link.href=canvasImg.toDataURL("image/"+type);
link.click();
});
}
